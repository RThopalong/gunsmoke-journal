<!DOCTYPE html>

  <meta charset="UTF-8">

  <title>Contact - Gunsmoke Journal</title>
  <link rel="stylesheet" href="style.css">

  <body>
  <header>
  <h1><a href="index.html">Gunsmoke Journal</a></h1>
  <nav><a href="index.html">Home</a> <a href="about.html">About</a> <a href="contact.html">Contact</a></nav>
  </header>
  <main>
  <h2>Contact</h2>
  <p>To contact Ryan please fill out the form below. I will get back to you as soon as possible.</p>
  <form class="contact" name="contact" method="POST" data-netlify="true">
  <input type="hidden" name="form-name" value="contact">
  <label for="name">Name</label>
  <input type="text" id="name" name="name" required>
  <label for="email">Email</label>
  <input type="email" id="email" name="email" required>
  <label for="website">Website</label>
  <input type="url" id="website" name="website">
  <label for="comment">Comment</label>
  <textarea id="comment" name="comment" rows="6" required></textarea>
  <button type="submit">Send</button>
  </form>
  </main>
  <footer><p>Gunsmoke Journal</p></footer>
  </body>
  </html>
